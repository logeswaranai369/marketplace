questions:
  - variable: siteUrl
    label: Public Site URL
    description: The full public URL where your Ghost site will be reachable.
    type: string
    default: https://example.com
    required: true
  - variable: appStorageSize
    label: Application Storage Size
    description: Disk size for Ghost content (images, themes).
    type: string
    default: 8Gi
    required: true
  - variable: dbPassword
    label: Database Password
    type: password
    generate: true
  - variable: dbRootPassword
    label: Database Root Password
    type: password
    generate: true
